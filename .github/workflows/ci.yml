name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"

      - name: Enable pinned pnpm
        run: npm install --global corepack@0.34.7 && corepack enable && corepack prepare pnpm@11.2.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate package
        run: pnpm typecheck && pnpm test && pnpm build && pnpm smoke:consumer && pnpm audit:prod && pnpm pack:dry-run

  native-pty:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"

      - name: Enable pinned pnpm
        run: npm install --global corepack@0.34.7 && corepack enable && corepack prepare pnpm@11.2.0 --activate

      - name: Install dependencies with allowBuilds policy
        run: pnpm install --frozen-lockfile

      - name: Load, spawn, and terminate native PTY
        run: pnpm smoke:pty-native
