name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"

      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.2.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate package
        run: pnpm typecheck && pnpm test && pnpm build && pnpm smoke:built-package && pnpm audit:prod && pnpm pack:dry-run
